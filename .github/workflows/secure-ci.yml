name: Zero Trust PR Security Pipeline

on:
  pull_request:
    branches:
      - main

# ------------------------------------------------
# Minimal Global Permissions
# ------------------------------------------------
permissions:
  contents: read

jobs:

  security-validation:

    name: Security Validation

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      # ----------------------------------------
      # Immutable Checkout
      # ----------------------------------------
      - name: Checkout Code
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      # ----------------------------------------
      # Gitleaks Secret Scan
      # ----------------------------------------
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

      # ----------------------------------------
      # Setup Python
      # ----------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ----------------------------------------
      # Install Dependencies
      # ----------------------------------------
      - name: Install Dependencies
        run: |
          pip install --no-cache-dir -r app/requirements.txt

      # ----------------------------------------
      # Semgrep SAST Scan
      # ----------------------------------------
      - name: Run Semgrep
        run: |
          pip install semgrep

          semgrep scan \
            --config auto \
            app/ \
            --json \
            > semgrep-results.json

      # ----------------------------------------
      # Build Validation Only
      # ----------------------------------------
      - name: Validate Docker Build
        run: |
          docker build \
            -t runtime-authority-lab:test \
            ./app

      # ----------------------------------------
      # Trivy Container Scan
      # ----------------------------------------
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: runtime-authority-lab:test
          format: table

      # ----------------------------------------
      # Generate SBOM
      # ----------------------------------------
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: runtime-authority-lab:test

      # ----------------------------------------
      # Upload Reports
      # ----------------------------------------
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            semgrep-results.json
            sbom.json