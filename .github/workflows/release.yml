name: Protected Release Pipeline

on:
  push:
    branches:
      - main

# ------------------------------------------------
# Explicit Permissions
# ------------------------------------------------
permissions:
  contents: read
  packages: write
  id-token: write

jobs:

  release:

    name: Secure Release

    runs-on: ubuntu-latest

    # ----------------------------------------
    # Protected Environment
    # ----------------------------------------
    environment:
      name: Production

    steps:

      # ----------------------------------------
      # Immutable Checkout
      # ----------------------------------------
      - name: Checkout Code
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608

      # ----------------------------------------
      # Docker Build
      # ----------------------------------------
      - name: Build Docker Image
        run: |
          docker build \
            -t runtime-authority-lab:${{ github.sha }} \
            ./app

      # ----------------------------------------
      # Docker Login
      # Replace later with OIDC
      # ----------------------------------------
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ----------------------------------------
      # Push Image
      # ----------------------------------------
      - name: Push Docker Image
        run: |
          docker tag runtime-authority-lab:${{ github.sha }} \
          ${{ secrets.DOCKER_USERNAME }}/runtime-authority-lab:${{ github.sha }}

          docker push \
          ${{ secrets.DOCKER_USERNAME }}/runtime-authority-lab:${{ github.sha }}

      # ----------------------------------------
      # Install Cosign
      # ----------------------------------------
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # ----------------------------------------
      # Keyless Signing
      # ----------------------------------------
      - name: Sign Image
        run: |
          cosign sign \
          ${{ secrets.DOCKER_USERNAME }}/runtime-authority-lab:${{ github.sha }} \
          --yes